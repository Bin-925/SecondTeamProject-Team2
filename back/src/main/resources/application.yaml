spring:
  application:
    name: back
  profiles:
    active: dev
    include:
      - secret
  output:
    ansi:
      enabled: always
  datasource:
    hikari:
      auto-commit: false
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  security:
    oauth2:
      front-callback-url: "http://localhost:3000"
      front-login-url: "http://localhost:3000/login"
      client:
        registration:
          kakao:
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
          google:
            scope:
              - profile
              - email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?access_type=offline&prompt=consent
springdoc:
  default-produces-media-type: application/json;charset=UTF-8
custom:
  jwt:
    accessToken:
      expirationSeconds: "#{60*10}"
    refreshToken:
      expirationSeconds: "#{60*60*24*7}"
    blacklist:
      grace-seconds: 60
  cors:
    allowed-origins: http://localhost:3000
  redis:
    refresh-token:
      prefix: "auth:refresh:"
      index-prefix: "auth:refresh:index:"

app:
  rate-limit:
    seat-status:
      capacity: 5
      refill-tokens: 5
      refill-seconds: 1
      expire-after-access-minutes: 10
      maximum-size: 10000
queue:
  batch-size: 2
  max-active-users: 5
  entry-token:
    ttl: 10m